version: "3.9"

services:
  canton:
    image: ${CANTON_IMAGE:-digitalasset/canton-open-source:3.4.0}
    container_name: cck-canton
    restart: unless-stopped
    command:
      - daemon
      - --config
      - /etc/canton/canton.conf
    volumes:
      - ./docs:/workspace/docs:ro
    environment:
      CANTON_PARTICIPANT_ONE: participant1
      CANTON_PARTICIPANT_TWO: participant2
    ports:
      - "5011:5011"
      - "5012:5012"
      - "5013:5013"
      - "5014:5014"
      - "7575:7575"
    profiles:
      - local

# Note:
# This repository intentionally keeps the first compose file lightweight because
# image availability and Canton configuration vary across local installations.
# Wire your participant/domain config into `/etc/canton/canton.conf` as part of
# local environment setup, then run:
#   docker compose --profile local up
