name: ci

on:
  push:
  pull_request:

jobs:
  daml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install DAML SDK
        run: |
          curl -sSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"
          dpm install package

      - name: Build
        run: dpm build

      - name: Run Tests
        run: dpm test
